# QSIRecon custom workflow: multishell scalars + MNI mapping + tractometry
# Produces native-space and MNI-space maps for DKI, NODDI, MAP-MRI.
# Runs MSMT-CSD → iFOD2 + SD_Stream tractography → connectivity matrices.
# Runs pyAFQ bundle recognition and along-tract profiling on iFOD2 streamlines.

name: gal_multishell_scalars

# MRtrix HSVS 5tt (requires FreeSurfer in your QSIPrep outputs)
anatomical:
   - mrtrix_5tt_hsvs

nodes:
  # ═══════════════════════════════════════════════════════════════════════════
  # SCALAR MODEL FITTING
  # ═══════════════════════════════════════════════════════════════════════════

  # --- DKI (DIPY) ---
  - action: DKI_reconstruction
    name: dipy_dki
    software: Dipy
    qsirecon_suffix: DIPYDKI
    parameters:
        wmti: true
        write_fibgz: false
        write_mif: false

  # --- NODDI (AMICO) ---
  - action: fit_noddi
    name: amico_noddi
    software: AMICO
    qsirecon_suffix: AMICONODDI
    parameters:
        dIso: 0.003
        dPar: 0.0017
        isExvivo: false

  # --- MAP-MRI (DIPY) ---
  - action: MAPMRI_reconstruction
    name: dipy_mapmri
    software: Dipy
    qsirecon_suffix: DIPYMAPMRI
    parameters:
        anisotropic_scaling: false
        big_delta: null
        bval_threshold: 2000
        dti_scale_estimation: false
        laplacian_regularization: true
        laplacian_weighting: 0.2
        radial_order: 6
        small_delta: null
        write_fibgz: true
        write_mif: true

  # --- DSI Studio GQI + scalar export ---
  - action: reconstruction
    input: qsirecon
    name: dsistudio_gqi
    parameters:
        method: gqi
    qsirecon_suffix: DSIStudio
    software: DSI Studio
  - action: export
    input: dsistudio_gqi
    name: scalar_export
    qsirecon_suffix: DSIStudio
    software: DSI Studio

  # ═══════════════════════════════════════════════════════════════════════════
  # MNI TEMPLATE MAPPING (all scalars → MNI space)
  # ═══════════════════════════════════════════════════════════════════════════

  - action: template_map
    name: template_map
    software: qsirecon
    input: qsirecon
    parameters:
      interpolation: Linear
    scalars_from:
      - dipy_dki
      - amico_noddi
      - dipy_mapmri
      - scalar_export

  # ═══════════════════════════════════════════════════════════════════════════
  # MSMT-CSD (MRtrix3) — with precomputed group-average response functions
  # ═══════════════════════════════════════════════════════════════════════════

  - action: csd
    input: qsirecon
    name: msmt_csd
    software: MRTrix3
    qsirecon_suffix: MRtrix3_act-HSVS
    parameters:
        fod:
            algorithm: msmt_csd
            max_sh:
            - 8
            - 8
            - 8
        mtnormalize: true
        response:
            algorithm: precomputed
            wm_txt: /responses/median_response_wm_balanced_1426.txt
            gm_txt: /responses/median_response_gm_balanced_1426.txt
            csf_txt: /responses/median_response_csf_balanced_1426.txt

  # ═══════════════════════════════════════════════════════════════════════════
  # TRACTOGRAPHY
  # ═══════════════════════════════════════════════════════════════════════════

  # --- Probabilistic (iFOD2) ---
  - action: tractography
    name: track_ifod2
    software: MRTrix3
    qsirecon_suffix: MRtrix3_act-HSVS
    input: msmt_csd
    parameters:
      method_5tt: hsvs
      use_5tt: true
      use_sift2: true
      sift2: {}
      tckgen:
        algorithm: iFOD2
        backtrack: true
        crop_at_gmwmi: true
        max_length: 250
        min_length: 30
        power: 0.33
        quiet: true
        select: 1000000

  # --- Deterministic (SD_Stream) ---
  - action: tractography
    name: track_sdstream
    software: MRTrix3
    qsirecon_suffix: MRtrix3_act-HSVS
    input: msmt_csd
    parameters:
      method_5tt: hsvs
      use_5tt: true
      use_sift2: true
      sift2: {}
      tckgen:
        algorithm: SD_Stream
        crop_at_gmwmi: true
        max_length: 250
        min_length: 30
        power: 0.33
        quiet: true
        select: 1000000

  # ═══════════════════════════════════════════════════════════════════════════
  # CONNECTIVITY MATRICES
  # ═══════════════════════════════════════════════════════════════════════════

  # --- Probabilistic connectivity (from iFOD2) ---
  - action: connectivity
    name: mrtrix_prob_conn
    software: MRTrix3
    qsirecon_suffix: MRtrix3_act-HSVS
    input: track_ifod2
    parameters:
      tck2connectome:
        - measure: sift_invnodevol_radius2_count
          scale_invnodevol: true
          search_radius: 2
          stat_edge: sum
          symmetric: true
          use_sift_weights: true
          zero_diagonal: false
        - measure: radius2_meanlength
          length_scale: length
          scale_invnodevol: false
          search_radius: 2
          stat_edge: mean
          symmetric: true
          use_sift_weights: false
          zero_diagonal: false
        - measure: radius2_count
          scale_invnodevol: false
          search_radius: 2
          stat_edge: sum
          symmetric: true
          use_sift_weights: false
          zero_diagonal: false
        - measure: sift_radius2_count
          scale_invnodevol: false
          search_radius: 2
          stat_edge: sum
          symmetric: true
          use_sift_weights: true
          zero_diagonal: false

  # --- Deterministic connectivity (from SD_Stream) ---
  - action: connectivity
    name: mrtrix_det_conn
    software: MRTrix3
    qsirecon_suffix: MRtrix3_act-HSVS
    input: track_sdstream
    parameters:
      tck2connectome:
        - measure: sift_invnodevol_radius2_count
          scale_invnodevol: true
          search_radius: 2
          stat_edge: sum
          symmetric: true
          use_sift_weights: true
          zero_diagonal: false
        - measure: radius2_meanlength
          length_scale: length
          scale_invnodevol: false
          search_radius: 2
          stat_edge: mean
          symmetric: true
          use_sift_weights: false
          zero_diagonal: false
        - measure: radius2_count
          scale_invnodevol: false
          search_radius: 2
          stat_edge: sum
          symmetric: true
          use_sift_weights: false
          zero_diagonal: false
        - measure: sift_radius2_count
          scale_invnodevol: false
          search_radius: 2
          stat_edge: sum
          symmetric: true
          use_sift_weights: true
          zero_diagonal: false

  # ═══════════════════════════════════════════════════════════════════════════
  # pyAFQ TRACTOMETRY — along-tract profiling using iFOD2 streamlines
  # ═══════════════════════════════════════════════════════════════════════════
  # Recognises ~24 major WM bundles from the iFOD2 tractogram and extracts
  # tissue-property profiles sampled at 100 nodes along each bundle.
  #
  # NOTE: pyAFQ downloads bundle template files on first run.
  #       If compute nodes lack internet, pre-cache templateflow + AFQ data
  #       and bind-mount them, or run once on a node with network access.

  - action: pyafq_tractometry
    input: track_ifod2
    name: pyafq_tractometry
    parameters:
        b0_threshold: 50
        brain_mask_definition: ''
        bundle_info: null
        clean_rounds: 5
        clip_edges: false
        csd_lambda_: 1
        csd_response: ''
        csd_sh_order: ''
        csd_tau: 0.1
        directions: prob
        dist_to_atlas: 4
        dist_to_waypoint: ''
        distance_threshold: 3
        export: all
        filter_b: true
        filter_by_endpoints: true
        greater_than: 50
        gtol: 0.01
        import_tract: ''
        length_threshold: 4
        mapping_definition: ''
        max_angle: 30.0
        max_bval: ''
        max_length: 250
        min_bval: ''
        min_length: 50
        min_sl: 20
        model_clust_thr: 1.25
        n_points: 100
        n_points_bundles: 40
        n_points_indiv: 40
        n_seeds: 1
        nb_points: false
        nb_streamlines: false
        odf_model: CSD
        presegment_bundle_dict: null
        presegment_kwargs: '{}'
        prob_threshold: 0
        profile_weights: gauss
        progressive: true
        pruning_thr: 12
        random_seeds: false
        reduction_thr: 25
        refine: false
        reg_algo: ''
        reg_subject_spec: power_map
        reg_template_spec: mni_T1
        return_idx: false
        rm_small_clusters: 50
        rng: ''
        rng_seed: ''
        robust_tensor_fitting: false
        roi_dist_tie_break: false
        save_intermediates: ''
        sbv_lims_bundles: '[None, None]'
        sbv_lims_indiv: '[None, None]'
        scalars:
          - dti_fa
          - dti_md
        parallel_segmentation:
          n_jobs: -1
          engine: joblib
          backend: loky
        seed_mask: ''
        seed_threshold: 0
        seg_algo: AFQ
        sphere: ''
        stat: mean
        step_size: 0.5
        stop_mask: ''
        stop_threshold: 0
        tracker: local
        use_external_tracking: true
        virtual_frame_buffer: false
        viz_backend_spec: plotly_no_gif
        volume_opacity_bundles: 0.3
        volume_opacity_indiv: 0.3
    qsirecon_suffix: PYAFQ
    software: pyAFQ

# Keep outputs in subject T1 space as well
space: T1w