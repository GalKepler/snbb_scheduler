# snbb_config.yaml — production configuration for the SNBB cluster
#
# Copy this file to /etc/snbb/config.yaml and adjust the paths to match
# your site. Everything under "procedures" is optional; remove the block
# entirely to use the built-in defaults (bids, qsiprep, freesurfer).

# ---------------------------------------------------------------------------
# Root directories
# ---------------------------------------------------------------------------
dicom_root:       /media/storage/yalab-dev/test_dicom
bids_root:        /media/storage/yalab-dev/snbb_scheduler/bids
derivatives_root: /media/storage/yalab-dev/snbb_scheduler/derivatives
state_file:       /media/storage/yalab-dev/snbb_scheduler/.scheduler_state.parquet

# Path to the daily-updated sessions CSV (columns: subject_code, session_id, ScanID).
# When set, the DICOM filesystem scan is skipped and ScanID is resolved as a
# flat subdirectory under dicom_root.  Remove or set to null to use filesystem scanning.
# sessions_file: /home/galkepler/Downloads/linked_sessions.csv
sessions_file: /home/galkepler/Projects/snbb_scheduler/examples/linked_sessions.csv

audit:
  dicom_min_files: 10
  stale_job_threshold_hours: 168
  report_dir: /media/storage/yalab-dev/snbb_scheduler/audit_reports
  email_recipients:
    - galkepler@gmail.com
  email_from: snbb-scheduler@localhost
  smtp_host: smtp.gmail.com
  smtp_port: 587
  smtp_tls: true
  smtp_username: your@gmail.com
  smtp_password: your-app-password

# ---------------------------------------------------------------------------
# Slurm settings
# ---------------------------------------------------------------------------
slurm_partition:     debug
slurm_account:       slurm
# slurm_mem:          32G    # passed as --mem to sbatch; omit to let Slurm use the cluster default
# slurm_cpus_per_task: 8     # passed as --cpus-per-task; omit for the cluster default

# Path to the QSIRecon workflow YAML.  When set, the qsirecon completion check
# requires one HTML report per workflow suffix listed in the spec.
qsirecon_spec: /home/galkepler/Projects/snbb_scheduler/scripts/qsirecon_full_spec.yaml

# ---------------------------------------------------------------------------
# Processing procedures — in dependency order
# ---------------------------------------------------------------------------
procedures:

  # BIDS conversion (heudiconv / dcm2bids)
  # Completion: all 8 required modality files must be present
  - name: bids
    output_dir: ""              # lives in bids_root, not derivatives_root
    script: /home/galkepler/Projects/snbb_scheduler/scripts/snbb_run_bids.sh
    scope: session
    depends_on: []
    completion_marker:
      - "anat/*_T1w.nii.gz"
      - "dwi/*dir-AP*_dwi.nii.gz"
      - "dwi/*dir-AP*_dwi.bvec"
      - "dwi/*dir-AP*_dwi.bval"
      - "dwi/*dir-PA*dwi.nii.gz"
      - "fmap/*acq-func_dir-AP*epi.nii.gz"
      - "fmap/*acq-func_dir-PA*epi.nii.gz"
      - "func/*task-rest_bold.nii.gz"

  - name: post-bids
    output_dir: ""              # lives in bids_root, not derivatives_root
    script: /home/galkepler/Projects/snbb_scheduler/scripts/snbb_run_bids_post.sh
    scope: session
    depends_on: [bids]
    completion_marker:
      - "fmap/*acq-dwi_dir-PA*epi.nii.gz"

  - name: defacing
    output_dir: ""              # lives in bids_root, not derivatives_root
    script: /home/galkepler/Projects/snbb_scheduler/scripts/snbb_run_defacing.sh
    scope: session
    depends_on: [bids]
    completion_marker:
      - "anat/*acq-defaced*T1w.nii.gz"
      - "anat/*acq-defaced*T2w.nii.gz"

  # DWI preprocessing (session-scoped)
  # Completion: per-session HTML report + expected preproc outputs
  - name: qsiprep
    output_dir: qsiprep
    script: /home/galkepler/Projects/snbb_scheduler/scripts/snbb_run_qsiprep.sh
    scope: session
    depends_on: [post-bids]
    completion_marker:
      - "*.html"
      - "dwi/*_dwi_preproc.nii.gz"
      - "dwi/*_dwi_preproc.bvec"
      - "dwi/*_dwi_preproc.bval"
      - "dwi/*desc-image_qc.tsv"

  # Cortical reconstruction — FreeSurfer longitudinal pipeline (subject-scoped).
  # Single-session subjects: plain cross-sectional recon-all.
  # Multi-session subjects: 3-step pipeline (cross-sectional → template → longitudinal).
  # Completion: specialised check in checks.py detects all required recon-all.done markers.
  - name: freesurfer
    output_dir: freesurfer
    script: /home/galkepler/Projects/snbb_scheduler/scripts/snbb_run_freesurfer.sh
    scope: subject
    depends_on: [post-bids]
    completion_marker: "scripts/recon-all.done"

  # DWI tractography reconstruction (session-scoped: requires qsiprep + freesurfer)
  # Completion: per-suffix HTML reports verified against qsirecon_spec workflow YAML
  - name: qsirecon
    output_dir: qsirecon
    script: /home/galkepler/Projects/snbb_scheduler/scripts/snbb_run_qsirecon.sh
    scope: session
    depends_on: [qsiprep, freesurfer]
    completion_marker: null

  # fMRI preprocessing
  # Completion: fmriprep writes an HTML report on success
  # - name: fmriprep
  #   output_dir: fmriprep
  #   script: snbb_run_fmriprep.sh
  #   scope: session
  #   depends_on: [bids]
  #   completion_marker: "**/*.html"
